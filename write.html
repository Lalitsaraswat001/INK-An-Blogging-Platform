<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Write Blog | Ink</title>
    <link rel="stylesheet" href="home.css">
    <style>
        .write-container {
            max-width: 700px;
            margin: auto;
            padding: 40px 20px;
            text-align: center;
        }

        .write-container input,
        .write-container textarea {
            width: 100%;
            padding: 12px;
            margin-top: 15px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 15px;
        }

        .publish-btn {
            margin-top: 20px;
            background: #ff5a2f;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
        }

        .publish-btn:hover {
            opacity: 0.9;
        }

        .dark {
            background: #121212;
            color: white;
        }

        .dark input,
        .dark textarea {
            background: #1e1e1e;
            color: white;
            border: 1px solid #444;
        }

        .dark .navbar {
            background: #1e1e1e;
        }
    </style>
</head>
<body>
    <header class="navbar">
        <div class="logo">Ink<span>.</span></div>
        <nav>
            <a href="home.html">Home</a>
            <a href="blogs.php">Blog</a>
            <a href="write.html" class="write-btn">✍ Write</a>

            <button onclick="toggleDark()" style="margin-left:15px;">🌙</button>
        </nav>
    </header>

    <section class="hero">
        <h1>Write a <span>Blog</span></h1>
        <p>Share your ideas and knowledge with the community.</p>
    </section>

    <div class="write-container">
        <form action="publish.php" method="POST">
            <input type="text" name="author" placeholder="Author Name" required>
            <input type="text" name="title" placeholder="Blog Title" required>
            <textarea name="content" rows="10" placeholder="Write your blog here..." required></textarea>
            <button class="publish-btn">Publish Blog</button>
        </form>
    </div>

    <script>

        function toggleDark() {
            document.body.classList.toggle("dark");
        }

    </script>

</body>
</html>
